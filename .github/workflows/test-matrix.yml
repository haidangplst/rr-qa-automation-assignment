name: Comprehensive Browser Test Matrix

on:
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test Category (leave empty for all)'
        required: false
        type: string
        default: ''
  schedule:
    # Run comprehensive tests weekly on Monday at 3 AM UTC
    - cron: '0 3 * * 1'

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        browser: ['Chrome', 'Firefox', 'WebKit']
        headless: ['true', 'false']
        # Exclude WebKit headed mode (experimental/less reliable in CI)
        exclude:
          - browser: 'WebKit'
            headless: 'false'

    env:
      BROWSER_TYPE: ${{ matrix.browser }}
      HEADLESS: ${{ matrix.headless }}
      TEST_CATEGORY: ${{ github.event.inputs.test_category || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Display Configuration
        run: |
          echo "════════════════════════════════════════════════════════════════════"
          echo "🌐 Browser Test Configuration"
          echo "════════════════════════════════════════════════════════════════════"
          echo "Browser: ${{ env.BROWSER_TYPE }}"
          echo "Headless: ${{ env.HEADLESS }}"
          if [ -n "${{ env.TEST_CATEGORY }}" ]; then
            echo "Category: ${{ env.TEST_CATEGORY }}"
          else
            echo "Category: All Tests"
          fi
          echo "════════════════════════════════════════════════════════════════════"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with category filter
        if: env.TEST_CATEGORY != ''
        timeout-minutes: 30
        run: |
          dotnet test --no-build --configuration Release \
            --logger "console;verbosity=normal" \
            --logger "nunit;LogFilePath=${{ runner.temp }}/test-results-${{ matrix.browser }}-${{ matrix.headless }}.xml" \
            --filter "Category=${{ env.TEST_CATEGORY }}" \
            --verbosity normal || true

      - name: Run all tests
        if: env.TEST_CATEGORY == ''
        timeout-minutes: 45
        run: |
          dotnet test --no-build --configuration Release \
            --logger "console;verbosity=normal" \
            --logger "nunit;LogFilePath=${{ runner.temp }}/test-results-${{ matrix.browser }}-${{ matrix.headless }}.xml" \
            --verbosity normal || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-matrix
          path: |
            ${{ runner.temp }}/test-results-*.xml
            PlaywrightTests/Reports/
          retention-days: 30

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.browser }}-${{ matrix.headless }}
          path: |
            PlaywrightTests/test-results/
            PlaywrightTests/bin/Debug/net10.0/Logs/
          retention-days: 7

  publish-results:
    if: always()
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Merge test results
        run: |
          echo "📊 Test Results Summary"
          find all-artifacts -name "*.xml" -type f | wc -l | xargs echo "Total result files:"
          echo ""
          echo "📁 Artifacts structure:"
          find all-artifacts -type f | head -20

      - name: Create test summary
        run: |
          echo "## 🧪 Comprehensive Browser Test Results" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Browser combinations tested:" >> $GITHUB_STEP_SUMMARY
          echo "- Chrome (Headless & Headed)" >> $GITHUB_STEP_SUMMARY
          echo "- Firefox (Headless & Headed)" >> $GITHUB_STEP_SUMMARY
          echo "- WebKit (Headless)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Test reports and artifacts are available in the Artifacts section" >> $GITHUB_STEP_SUMMARY
